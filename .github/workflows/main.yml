name: Clone Repo to New Repo

# Trigger manually: give the link to the repo you want cloned,
# and the name for the new repo that will be created in Kallwik.
on:
  workflow_dispatch:
    inputs:
      target_repo_url:
        description: 'Link of the repo to clone (e.g. https://github.com/owner/repo)'
        required: true
        type: string
      new_repo_name:
        description: 'Name for the new repo to create in Kallwik'
        required: true
        type: string
      visibility:
        description: 'Visibility of the new repo'
        required: false
        default: 'private'
        type: choice
        options:
          - private
          - public
          - internal

env:
  TARGET_ORG: Kallwik

jobs:
  clone-and-create:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # 1. Parse owner/repo out of the given URL
      # ------------------------------------------------------------
      - name: Parse source repo from URL
        id: parse
        env:
          TARGET_REPO_URL: ${{ inputs.target_repo_url }}
        run: |
          # Strip trailing slash, ".git" suffix, and protocol/host
          CLEAN_URL="${TARGET_REPO_URL%/}"
          CLEAN_URL="${CLEAN_URL%.git}"
          SOURCE_REPO=$(echo "$CLEAN_URL" | sed -E 's#^https?://github\.com/##')

          if [[ -z "$SOURCE_REPO" || "$SOURCE_REPO" != *"/"* ]]; then
            echo "::error::Could not parse owner/repo from '$TARGET_REPO_URL'. Expected format: https://github.com/owner/repo"
            exit 1
          fi

          echo "source_repo=$SOURCE_REPO" >> "$GITHUB_OUTPUT"
          echo "Resolved source repo: $SOURCE_REPO"

      # ------------------------------------------------------------
      # 2. Create the new (empty) repository in Kallwik
      # ------------------------------------------------------------
      - name: Create new repository
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          NEW_REPO_NAME: ${{ inputs.new_repo_name }}
          VISIBILITY: ${{ inputs.visibility }}
        run: |
          gh repo create "$TARGET_ORG/$NEW_REPO_NAME" "--$VISIBILITY"

      # ------------------------------------------------------------
      # 3. Mirror-clone the source repo into the new repo
      #    (full history, all branches and tags)
      # ------------------------------------------------------------
      - name: Mirror-clone source repo into new repo
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          SOURCE_REPO: ${{ steps.parse.outputs.source_repo }}
          NEW_REPO_NAME: ${{ inputs.new_repo_name }}
        run: |
          git clone --mirror "https://x-access-token:${GH_TOKEN}@github.com/${SOURCE_REPO}.git" source.git
          cd source.git
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_ORG}/${NEW_REPO_NAME}.git"
          # Push branches and tags only — GitHub always rejects refs/pull/*
          # (its own auto-managed PR refs), so a full --mirror push fails.
          git push origin 'refs/heads/*:refs/heads/*'
          git push origin 'refs/tags/*:refs/tags/*'

      # ------------------------------------------------------------
      # 4. Summary
      # ------------------------------------------------------------
      - name: Summary
        env:
          NEW_REPO_NAME: ${{ inputs.new_repo_name }}
        run: |
          echo "### Repo cloned successfully" >> "$GITHUB_STEP_SUMMARY"
          echo "New repo: https://github.com/${TARGET_ORG}/${NEW_REPO_NAME}" >> "$GITHUB_STEP_SUMMARY"
